<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Webcams</title>
    <style>
        body { background-color: #121212; color: #ffffff; padding: 20px; }
        #webcam-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .webcam-card { background-color: #1e1e1e; padding: 10px; border-radius: 10px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background-color: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>Live Webcams</h1>
    <div id="webcam-grid"></div>

    <script>
        // Force the browser to grab the latest file with a cache buster
        fetch('webcams.json?v=' + new Date().getTime())
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                console.log("JSON Loaded successfully:", data);
                const grid = document.getElementById('webcam-grid');
                grid.innerHTML = ''; 

                data.forEach(cam => {
                    console.log("Building card for:", cam.title);
                    
                    // If no youtubeId, just skip to avoid empty iframes
                    if (!cam.youtubeId || cam.youtubeId === 'ROBOT_WILL_REPLACE_THIS') {
                        console.warn("Skipping camera due to invalid ID:", cam.title);
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = 'webcam-card';
                    card.innerHTML = `
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${cam.youtubeId}?autoplay=1&mute=1" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <h3>${cam.title}</h3>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => console.error('BIG ERROR LOADING JSON:', error));
    </script>
</body>
</html>
